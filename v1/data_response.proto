edition = "2023";

package UDataPacketCacheServiceAPI.V1;
import "uDataPacketCacheServiceAPI/v1/time_series.proto";

/*!
 * The time series corresponding to a data request.
 */
message DataResponse {
   // The identifier corresponding to the input request.
   string identifier = 1 [default = ""];
   // The individual time series corresponding to each specified stream.
   repeated TimeSeries time_series = 2;
}
