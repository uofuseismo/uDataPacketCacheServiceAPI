edition = "2023";

package UDataPacketCacheAPI.V1;
import "uDataPacketCacheAPI/v1/time_series.proto";

/*!
 * The time series corresponding to a data request.
 */
message DataResponse {
   string identifier = 1 [default = ""]; /// The identifier corresponding to the input request.
   repeated TimeSeries time_series;      /// The series corresponding to the data request.
}
