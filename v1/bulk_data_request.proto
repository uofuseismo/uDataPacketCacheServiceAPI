edition = "2023";

package UDataPacketCacheServiceAPI.V1;
import "uDataPacketCacheServiceAPI/v1/data_request.proto";

/*!
 * Requests time series data from multiple streams simultaneously.  This is a
 * better strategy than repeatededly calling the API with individual data
 * requests.
 */
message BulkDataRequest {
   string identifier = 1 [default = ""];      /// A request identifier.
   repeated DataRequest data_requests = 2;    /// The data requests - duplicates will be ignored.
}

