edition = "2023";

package UDataPacketCacheServiceAPI.V1;
import "uDataPacketCacheServiceAPI/v1/data_response.proto";

/*!
 * The time series corresponding to the data requests.
 */
message DataResponse {
   string identifier = 1 [default = ""]; /// The input data request identifier.
   repeated DataResponse data_response;  /// The responses corresponding to the input requests.
}

